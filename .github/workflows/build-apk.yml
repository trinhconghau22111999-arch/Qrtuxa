name: Build Math App APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Tạo toàn bộ cấu trúc project
        run: |
          mkdir -p app
          mkdir -p app/src/main
          mkdir -p app/src/main/java/com/example/calculator
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/values

          # ===== app/build.gradle =====
          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.example.calculator'
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.calculator"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              buildFeatures {
                  viewBinding true
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }

          EOF

          # ===== app/src/main/AndroidManifest.xml =====
          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.Calculator"
                  android:supportsRtl="true">

                  <activity android:name=".MenuActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity android:name=".CalculatorActivity" android:exported="false" />
                  <activity android:name=".IntegerToolsActivity" android:exported="false" />
                  <activity android:name=".FractionActivity" android:exported="false" />
                  <activity android:name=".LinearEquationActivity" android:exported="false" />
                  <activity android:name=".QuadraticEquationActivity" android:exported="false" />
                  <activity android:name=".LinearSystemActivity" android:exported="false" />
                  <activity android:name=".PolynomialActivity" android:exported="false" />
                  <activity android:name=".ComplexNumberActivity" android:exported="false" />
                  <activity android:name=".SequenceActivity" android:exported="false" />
                  <activity android:name=".CalculusActivity" android:exported="false" />
                  <activity android:name=".VectorActivity" android:exported="false" />
                  <activity android:name=".StatsActivity" android:exported="false" />
                  <activity android:name=".GeometryActivity" android:exported="false" />

              </application>

          </manifest>

          EOF

          # ===== app/src/main/java/com/example/calculator/CalculatorActivity.kt =====
          cat > app/src/main/java/com/example/calculator/CalculatorActivity.kt <<'EOF'
          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityCalculatorBinding
          import java.text.DecimalFormat
          import kotlin.math.*

          class CalculatorActivity : AppCompatActivity() {

              private lateinit var binding: ActivityCalculatorBinding

              private var currentInput: String = "0"
              private var pendingOperator: String? = null
              private var firstOperand: Double? = null
              private var justEvaluated: Boolean = false

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityCalculatorBinding.inflate(layoutInflater)
                  setContentView(binding.root)
                  setupButtons()
                  updateDisplay()
              }

              private fun setupButtons() {
                  val digitButtons = mapOf(
                      binding.btn0 to "0", binding.btn1 to "1", binding.btn2 to "2",
                      binding.btn3 to "3", binding.btn4 to "4", binding.btn5 to "5",
                      binding.btn6 to "6", binding.btn7 to "7", binding.btn8 to "8",
                      binding.btn9 to "9"
                  )
                  digitButtons.forEach { (button, digit) ->
                      button.setOnClickListener { onDigit(digit) }
                  }

                  binding.btnDot.setOnClickListener { onDot() }
                  binding.btnClear.setOnClickListener { onClear() }
                  binding.btnBackspace.setOnClickListener { onBackspace() }
                  binding.btnPercent.setOnClickListener { onPercent() }
                  binding.btnEquals.setOnClickListener { onEquals() }

                  binding.btnPlus.setOnClickListener { onOperator("+") }
                  binding.btnMinus.setOnClickListener { onOperator("−") }
                  binding.btnMultiply.setOnClickListener { onOperator("×") }
                  binding.btnDivide.setOnClickListener { onOperator("÷") }

                  binding.btnSin.setOnClickListener { onUnary("sin") }
                  binding.btnCos.setOnClickListener { onUnary("cos") }
                  binding.btnTan.setOnClickListener { onUnary("tan") }
                  binding.btnSqrt.setOnClickListener { onUnary("√") }
                  binding.btnSquare.setOnClickListener { onUnary("x²") }
                  binding.btnLog.setOnClickListener { onUnary("log") }
                  binding.btnLn.setOnClickListener { onUnary("ln") }
                  binding.btnReciprocal.setOnClickListener { onUnary("1/x") }
                  binding.btnPi.setOnClickListener { onPi() }
                  binding.btnPow.setOnClickListener { onOperator("xʸ") }
              }

              private fun onDigit(digit: String) {
                  if (currentInput == "0" || justEvaluated) {
                      currentInput = digit
                      justEvaluated = false
                  } else {
                      currentInput += digit
                  }
                  updateDisplay()
              }

              private fun onDot() {
                  if (justEvaluated) {
                      currentInput = "0."
                      justEvaluated = false
                  } else if (!currentInput.contains(".")) {
                      currentInput += "."
                  }
                  updateDisplay()
              }

              private fun onClear() {
                  currentInput = "0"
                  pendingOperator = null
                  firstOperand = null
                  justEvaluated = false
                  updateDisplay()
              }

              private fun onBackspace() {
                  currentInput = if (currentInput.length > 1) currentInput.dropLast(1) else "0"
                  updateDisplay()
              }

              private fun onPercent() {
                  val value = currentInput.toDoubleOrNull() ?: return
                  currentInput = formatNumber(value / 100.0)
                  updateDisplay()
              }

              private fun onUnary(op: String) {
                  val value = currentInput.toDoubleOrNull() ?: return
                  val result = when (op) {
                      "sin" -> sin(Math.toRadians(value))
                      "cos" -> cos(Math.toRadians(value))
                      "tan" -> tan(Math.toRadians(value))
                      "√" -> if (value >= 0) sqrt(value) else Double.NaN
                      "x²" -> value * value
                      "log" -> if (value > 0) log10(value) else Double.NaN
                      "ln" -> if (value > 0) ln(value) else Double.NaN
                      "1/x" -> if (value != 0.0) 1.0 / value else Double.NaN
                      else -> value
                  }
                  currentInput = formatNumber(result)
                  justEvaluated = true
                  updateDisplay()
              }

              private fun onPi() {
                  currentInput = formatNumber(PI)
                  justEvaluated = true
                  updateDisplay()
              }

              private fun onOperator(op: String) {
                  val value = currentInput.toDoubleOrNull() ?: return
                  when {
                      pendingOperator != null && currentInput == "0" && !justEvaluated -> {
                          // Người dùng đổi ý toán tử liên tiếp (vd: bấm + rồi ×) — chỉ đổi toán tử, không tính lại
                          pendingOperator = op
                      }
                      pendingOperator != null && !justEvaluated -> {
                          firstOperand = calculate(firstOperand ?: 0.0, value, pendingOperator!!)
                          pendingOperator = op
                      }
                      else -> {
                          firstOperand = value
                          pendingOperator = op
                      }
                  }
                  justEvaluated = false
                  currentInput = "0"
                  updateDisplay()
              }

              private fun onEquals() {
                  val second = currentInput.toDoubleOrNull() ?: return
                  val op = pendingOperator
                  val first = firstOperand
                  if (op != null && first != null) {
                      val result = calculate(first, second, op)
                      currentInput = formatNumber(result)
                      pendingOperator = null
                      firstOperand = null
                      justEvaluated = true
                  }
                  updateDisplay()
              }

              private fun calculate(a: Double, b: Double, op: String): Double {
                  return when (op) {
                      "+" -> a + b
                      "−" -> a - b
                      "×" -> a * b
                      "÷" -> if (b != 0.0) a / b else Double.NaN
                      "xʸ" -> a.pow(b)
                      else -> b
                  }
              }

              private fun formatNumber(value: Double): String {
                  if (value.isNaN()) return "Lỗi"
                  val df = DecimalFormat("#,##0.##########")
                  return df.format(value)
              }

              private fun updateDisplay() {
                  binding.tvDisplay.text = currentInput
              }
          }

          EOF

          # ===== app/src/main/java/com/example/calculator/CalculusActivity.kt =====
          cat > app/src/main/java/com/example/calculator/CalculusActivity.kt <<'EOF'
          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityCalculusBinding
          import kotlin.math.pow

          class CalculusActivity : AppCompatActivity() {
              private lateinit var binding: ActivityCalculusBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityCalculusBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }
                  binding.btnDerivative.setOnClickListener { calcDerivative() }
                  binding.btnAntiderivative.setOnClickListener { calcAntiderivative() }
                  binding.btnDefiniteIntegral.setOnClickListener { calcDefiniteIntegral() }
              }

              // Hệ số lưu theo thứ tự bậc cao -> thấp, ví dụ [1,0,-2,1] nghĩa là x^3 + 0x^2 - 2x + 1
              private fun parsePoly(): DoubleArray? {
                  return try {
                      binding.etPoly.text.toString().split(",").map { it.trim().toDouble() }.toDoubleArray()
                  } catch (e: Exception) { null }
              }

              private fun calcDerivative() {
                  val p = parsePoly()
                  if (p == null) { binding.tvResult.text = "Vui lòng nhập đa thức hợp lệ."; return }
                  val degree = p.size - 1
                  if (degree == 0) { binding.tvResult.text = "f'(x) = 0"; return }
                  val deriv = DoubleArray(degree)
                  for (i in 0 until degree) {
                      val power = degree - i
                      deriv[i] = p[i] * power
                  }
                  binding.tvResult.text = "f'(x) = ${toReadable(deriv)}"
              }

              private fun calcAntiderivative() {
                  val p = parsePoly()
                  if (p == null) { binding.tvResult.text = "Vui lòng nhập đa thức hợp lệ."; return }
                  val degree = p.size - 1
                  val result = DoubleArray(p.size + 1)
                  for (i in p.indices) {
                      val power = degree - i
                      result[i] = p[i] / (power + 1)
                  }
                  // result[last] = C (hằng số tích phân, để 0)
                  binding.tvResult.text = "F(x) = ${toReadable(result)} + C"
              }

              private fun calcDefiniteIntegral() {
                  val p = parsePoly()
                  val a = binding.etLowerBound.text.toString().toDoubleOrNull()
                  val b = binding.etUpperBound.text.toString().toDoubleOrNull()
                  if (p == null || a == null || b == null) {
                      binding.tvResult.text = "Vui lòng nhập đa thức và cận a, b hợp lệ."
                      return
                  }
                  val degree = p.size - 1
                  fun evalAntiderivativeAt(x: Double): Double {
                      var sum = 0.0
                      for (i in p.indices) {
                          val power = degree - i
                          sum += p[i] / (power + 1) * x.pow(power + 1)
                      }
                      return sum
                  }
                  val result = evalAntiderivativeAt(b) - evalAntiderivativeAt(a)
                  binding.tvResult.text = "∫ từ ${trim(a)} đến ${trim(b)} f(x)dx = ${trim(result)}"
              }

              private fun toReadable(coeffs: DoubleArray): String {
                  val degree = coeffs.size - 1
                  val sb = StringBuilder()
                  for (i in coeffs.indices) {
                      val power = degree - i
                      val c = coeffs[i]
                      if (c == 0.0) continue
                      val sign = if (sb.isEmpty()) (if (c < 0) "−" else "") else (if (c < 0) " − " else " + ")
                      val absC = trim(kotlin.math.abs(c))
                      val term = when {
                          power == 0 -> absC
                          power == 1 -> if (absC == "1") "x" else "${absC}x"
                          else -> if (absC == "1") "x^$power" else "${absC}x^$power"
                      }
                      sb.append(sign).append(term)
                  }
                  return if (sb.isEmpty()) "0" else sb.toString()
              }

              private fun trim(v: Double): String {
                  return if (v == v.toLong().toDouble()) v.toLong().toString()
                  else "%.6f".format(v).trimEnd('0').trimEnd('.')
              }
          }

          EOF

          # ===== app/src/main/java/com/example/calculator/ComplexNumberActivity.kt =====
          cat > app/src/main/java/com/example/calculator/ComplexNumberActivity.kt <<'EOF'
          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityComplexNumberBinding

          class ComplexNumberActivity : AppCompatActivity() {
              private lateinit var binding: ActivityComplexNumberBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityComplexNumberBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }
                  binding.btnAdd.setOnClickListener { withComplex { z1, z2 -> "z1 + z2 = ${z1 + z2}" } }
                  binding.btnSub.setOnClickListener { withComplex { z1, z2 -> "z1 − z2 = ${z1 - z2}" } }
                  binding.btnMul.setOnClickListener { withComplex { z1, z2 -> "z1 × z2 = ${z1 * z2}" } }
                  binding.btnDiv.setOnClickListener { withComplex { z1, z2 ->
                      if (z2.re == 0.0 && z2.im == 0.0) "Không thể chia cho 0." else "z1 ÷ z2 = ${z1 / z2}"
                  } }
                  binding.btnModulus.setOnClickListener {
                      val z1 = readZ1()
                      val z2 = readZ2()
                      binding.tvResult.text = if (z1 == null || z2 == null) {
                          "Vui lòng nhập đủ phần thực và phần ảo."
                      } else {
                          "|z1| = ${trim(z1.modulus())}\n|z2| = ${trim(z2.modulus())}"
                      }
                  }
              }

              private fun readZ1(): Complex? {
                  val re = binding.etRe1.text.toString().toDoubleOrNull() ?: return null
                  val im = binding.etIm1.text.toString().toDoubleOrNull() ?: return null
                  return Complex(re, im)
              }

              private fun readZ2(): Complex? {
                  val re = binding.etRe2.text.toString().toDoubleOrNull() ?: return null
                  val im = binding.etIm2.text.toString().toDoubleOrNull() ?: return null
                  return Complex(re, im)
              }

              private fun withComplex(block: (Complex, Complex) -> String) {
                  val z1 = readZ1()
                  val z2 = readZ2()
                  binding.tvResult.text = if (z1 == null || z2 == null) {
                      "Vui lòng nhập đủ phần thực và phần ảo của hai số phức."
                  } else block(z1, z2)
              }

              private fun trim(v: Double): String {
                  return if (v == v.toLong().toDouble()) v.toLong().toString()
                  else "%.6f".format(v).trimEnd('0').trimEnd('.')
              }
          }

