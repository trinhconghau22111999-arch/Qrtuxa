          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityLinearEquationBinding

          class LinearEquationActivity : AppCompatActivity() {
              private lateinit var binding: ActivityLinearEquationBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityLinearEquationBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }
                  binding.btnCalc.setOnClickListener { calc() }
              }

              private fun calc() {
                  val a = binding.etA.text.toString().toDoubleOrNull()
                  val b = binding.etB.text.toString().toDoubleOrNull()
                  if (a == null || b == null) {
                      binding.tvResult.text = "Vui lòng nhập đủ hệ số a, b."
                      return
                  }
                  binding.tvResult.text = when {
