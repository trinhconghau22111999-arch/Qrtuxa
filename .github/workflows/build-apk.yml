          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityVectorBinding
          import kotlin.math.sqrt

          class VectorActivity : AppCompatActivity() {
              private lateinit var binding: ActivityVectorBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityVectorBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }
                  binding.btnAdd.setOnClickListener { withVectors { a, b -> "A + B = ${fmt(add(a, b))}" } }
                  binding.btnSub.setOnClickListener { withVectors { a, b -> "A − B = ${fmt(sub(a, b))}" } }
                  binding.btnDot.setOnClickListener { withVectors { a, b -> "A · B = ${trim(dot(a, b))}" } }
                  binding.btnScale.setOnClickListener {
                      val a = parse(binding.etVA.text.toString())
                      val k = binding.etK.text.toString().toDoubleOrNull()
                      if (a == null || k == null) {
                          binding.tvResult.text = "Vui lòng nhập vectơ A và hệ số k hợp lệ."
                      } else {
                          binding.tvResult.text = "k · A = ${fmt(a.map { it * k }.toDoubleArray())}"
                      }
                  }
                  binding.btnLength.setOnClickListener {
                      val a = parse(binding.etVA.text.toString())
                      val b = parse(binding.etVB.text.toString())
                      if (a == null || b == null) {
                          binding.tvResult.text = "Vui lòng nhập vectơ A và B hợp lệ."
                      } else {
                          binding.tvResult.text = "|A| = ${trim(length(a))}\n|B| = ${trim(length(b))}"
                      }
                  }
              }

              private fun withVectors(block: (DoubleArray, DoubleArray) -> String) {
                  val a = parse(binding.etVA.text.toString())
                  val b = parse(binding.etVB.text.toString())
                  binding.tvResult.text = if (a == null || b == null) {
                      "Vui lòng nhập vectơ A và B hợp lệ."
                  } else {
                      val (pa, pb) = pad(a, b)
                      block(pa, pb)
                  }
              }

              private fun parse(s: String): DoubleArray? {
                  return try {
                      s.split(",").map { it.trim().toDouble() }.toDoubleArray()
                  } catch (e: Exception) { null }
              }

              private fun pad(a: DoubleArray, b: DoubleArray): Pair<DoubleArray, DoubleArray> {
                  val n = maxOf(a.size, b.size)
                  val pa = DoubleArray(n) { if (it < a.size) a[it] else 0.0 }
                  val pb = DoubleArray(n) { if (it < b.size) b[it] else 0.0 }
                  return pa to pb
              }

              private fun add(a: DoubleArray, b: DoubleArray) = DoubleArray(a.size) { a[it] + b[it] }
              private fun sub(a: DoubleArray, b: DoubleArray) = DoubleArray(a.size) { a[it] - b[it] }
              private fun dot(a: DoubleArray, b: DoubleArray) = a.indices.sumOf { a[it] * b[it] }
              private fun length(a: DoubleArray) = sqrt(a.sumOf { it * it })

              private fun fmt(v: DoubleArray) = "(${v.joinToString(", ") { trim(it) }})"

              private fun trim(v: Double): String {
                  return if (v == v.toLong().toDouble()) v.toLong().toString()
                  else "%.6f".format(v).trimEnd('0').trimEnd('.')
              }
          }

