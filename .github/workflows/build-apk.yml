          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityPolynomialBinding

          class PolynomialActivity : AppCompatActivity() {
              private lateinit var binding: ActivityPolynomialBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityPolynomialBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }
                  binding.btnAdd.setOnClickListener { compute("+") }
                  binding.btnSub.setOnClickListener { compute("−") }
                  binding.btnMul.setOnClickListener { compute("×") }
              }

              private fun parse(s: String): DoubleArray? {
                  return try {
                      s.split(",").map { it.trim().toDouble() }.toDoubleArray()
                  } catch (e: Exception) {
                      null
                  }
              }

              private fun compute(op: String) {
                  val p1 = parse(binding.etPoly1.text.toString())
                  val p2 = parse(binding.etPoly2.text.toString())
                  if (p1 == null || p2 == null) {
                      binding.tvResult.text = "Vui lòng nhập hệ số hợp lệ, cách nhau bởi dấu phẩy."
                      return
                  }

                  val result: DoubleArray = when (op) {
                      "+" -> addPoly(p1, p2)
                      "−" -> addPoly(p1, p2.map { -it }.toDoubleArray())
                      "×" -> mulPoly(p1, p2)
                      else -> doubleArrayOf(0.0)
                  }

                  binding.tvResult.text = "Kết quả:\n${toReadable(result)}\n\nHệ số: ${result.joinToString(", ") { trim(it) }}"
              }

              private fun addPoly(a: DoubleArray, b: DoubleArray): DoubleArray {
                  val n = maxOf(a.size, b.size)
                  val ra = DoubleArray(n)
                  val rb = DoubleArray(n)
                  a.reversed().forEachIndexed { i, v -> ra[i] = v }
                  b.reversed().forEachIndexed { i, v -> rb[i] = v }
                  val result = DoubleArray(n) { ra[it] + rb[it] }
                  return result.reversed().toDoubleArray()
              }

              private fun mulPoly(a: DoubleArray, b: DoubleArray): DoubleArray {
                  val result = DoubleArray(a.size + b.size - 1)
                  for (i in a.indices) {
                      for (j in b.indices) {
                          result[i + j] += a[i] * b[j]
                      }
                  }
                  return result
              }

              private fun toReadable(coeffs: DoubleArray): String {
                  val degree = coeffs.size - 1
                  val sb = StringBuilder()
                  for (i in coeffs.indices) {
                      val power = degree - i
                      val c = coeffs[i]
                      if (c == 0.0) continue
                      val sign = if (sb.isEmpty()) (if (c < 0) "−" else "") else (if (c < 0) " − " else " + ")
                      val absC = trim(kotlin.math.abs(c))
                      val term = when {
                          power == 0 -> absC
                          power == 1 -> if (absC == "1") "x" else "${absC}x"
                          else -> if (absC == "1") "x^$power" else "${absC}x^$power"
                      }
                      sb.append(sign).append(term)
                  }
                  return if (sb.isEmpty()) "0" else sb.toString()
              }

              private fun trim(v: Double): String {
                  return if (v == v.toLong().toDouble()) v.toLong().toString()
                  else "%.4f".format(v).trimEnd('0').trimEnd('.')
              }
          }

