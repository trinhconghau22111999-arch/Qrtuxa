          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivitySequenceBinding
          import kotlin.math.pow

          class SequenceActivity : AppCompatActivity() {
              private lateinit var binding: ActivitySequenceBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivitySequenceBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }
                  binding.btnArithmetic.setOnClickListener { calcArithmetic() }
                  binding.btnGeometric.setOnClickListener { calcGeometric() }
              }

              private fun readInputs(): Triple<Double, Double, Int>? {
                  val u1 = binding.etU1.text.toString().toDoubleOrNull() ?: return null
                  val d = binding.etD.text.toString().toDoubleOrNull() ?: return null
                  val n = binding.etN.text.toString().toIntOrNull() ?: return null
                  return Triple(u1, d, n)
              }

              private fun calcArithmetic() {
                  val inp = readInputs()
                  if (inp == null) { binding.tvResult.text = "Vui lòng nhập đủ u1, d, n."; return }
                  val (u1, d, n) = inp
                  val un = u1 + (n - 1) * d
                  val sn = n * (u1 + un) / 2.0
                  binding.tvResult.text = "Số hạng thứ $n: u$n = ${trim(un)}\nTổng $n số hạng đầu: S$n = ${trim(sn)}"
              }

              private fun calcGeometric() {
                  val inp = readInputs()
                  if (inp == null) { binding.tvResult.text = "Vui lòng nhập đủ u1, q, n."; return }
                  val (u1, q, n) = inp
                  val un = u1 * q.pow(n - 1)
                  val sn = if (q == 1.0) u1 * n else u1 * (1 - q.pow(n)) / (1 - q)
                  binding.tvResult.text = "Số hạng thứ $n: u$n = ${trim(un)}\nTổng $n số hạng đầu: S$n = ${trim(sn)}"
              }

              private fun trim(v: Double): String {
                  return if (v == v.toLong().toDouble()) v.toLong().toString()
                  else "%.6f".format(v).trimEnd('0').trimEnd('.')
              }
          }

