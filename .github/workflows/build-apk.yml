          # ===== app/src/main/java/com/example/calculator/FractionActivity.kt =====
          cat > app/src/main/java/com/example/calculator/FractionActivity.kt <<'EOF'
          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityFractionBinding

          class FractionActivity : AppCompatActivity() {
              private lateinit var binding: ActivityFractionBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityFractionBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }
                  binding.btnCalc.setOnClickListener { calc() }
              }

              private fun calc() {
                  val n1 = binding.etNum1.text.toString().toLongOrNull()
                  val d1 = binding.etDen1.text.toString().toLongOrNull()
                  val n2 = binding.etNum2.text.toString().toLongOrNull()
                  val d2 = binding.etDen2.text.toString().toLongOrNull()

                  if (n1 == null || d1 == null || n2 == null || d2 == null || d1 == 0L || d2 == 0L) {
                      binding.tvResult.text = "Vui lòng nhập đủ tử/mẫu hợp lệ (mẫu số khác 0)."
                      return
                  }

                  val f1 = Fraction(n1, d1)
                  val f2 = Fraction(n2, d2)

                  val thuong = if (n2 == 0L) "không xác định (chia cho 0)" else (f1 / f2).toString()

                  binding.tvResult.text = """
                      Rút gọn phân số 1: ${f1.simplify()}
                      Rút gọn phân số 2: ${f2.simplify()}

                      Tổng: ${f1 + f2}
                      Hiệu: ${f1 - f2}
                      Tích: ${f1 * f2}
                      Thương: $thuong
                  """.trimIndent()
              }
          }

