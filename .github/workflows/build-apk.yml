          package com.example.calculator

          import kotlin.math.abs

          object MathUtils {

              fun gcd(a: Long, b: Long): Long {
                  var x = abs(a); var y = abs(b)
                  while (y != 0L) { val t = y; y = x % y; x = t }
                  return if (x == 0L) 1L else x
              }

              fun lcm(a: Long, b: Long): Long {
                  if (a == 0L || b == 0L) return 0L
                  return abs(a / gcd(a, b) * b)
              }

              fun factorial(n: Int): Double {
                  if (n <= 1) return 1.0
                  var result = 1.0
                  for (i in 2..n) result *= i
                  return result
              }

              fun nPr(n: Int, r: Int): Double {
                  if (r > n || r < 0) return Double.NaN
                  var result = 1.0
                  for (i in 0 until r) result *= (n - i)
                  return result
              }

              fun nCr(n: Int, r: Int): Double {
                  if (r > n || r < 0) return Double.NaN
                  return nPr(n, r) / factorial(r)
              }
          }

          // ===== Phân số =====
          data class Fraction(val num: Long, val den: Long) {

              fun simplify(): Fraction {
                  if (den == 0L) return this
                  val g = MathUtils.gcd(num, den)
                  var n = num / g
                  var d = den / g
                  if (d < 0) { n = -n; d = -d }
                  return Fraction(n, d)
              }

              operator fun plus(o: Fraction) = Fraction(num * o.den + o.num * den, den * o.den).simplify()
              operator fun minus(o: Fraction) = Fraction(num * o.den - o.num * den, den * o.den).simplify()
              operator fun times(o: Fraction) = Fraction(num * o.num, den * o.den).simplify()
              operator fun div(o: Fraction) = Fraction(num * o.den, den * o.num).simplify()

              fun toDouble(): Double = if (den != 0L) num.toDouble() / den.toDouble() else Double.NaN

              override fun toString(): String {
                  val s = simplify()
                  return if (s.den == 1L) "${s.num}" else "${s.num}/${s.den}"
              }
          }

          // ===== Số phức =====
          data class Complex(val re: Double, val im: Double) {

              operator fun plus(o: Complex) = Complex(re + o.re, im + o.im)
              operator fun minus(o: Complex) = Complex(re - o.re, im - o.im)
              operator fun times(o: Complex) = Complex(re * o.re - im * o.im, re * o.im + im * o.re)
              operator fun div(o: Complex): Complex {
                  val d = o.re * o.re + o.im * o.im
                  return Complex((re * o.re + im * o.im) / d, (im * o.re - re * o.im) / d)
              }

              fun modulus(): Double = kotlin.math.sqrt(re * re + im * im)

              override fun toString(): String {
                  val r = trim(re)
                  val i = trim(abs(im))
                  return when {
                      im == 0.0 -> r
                      im > 0 -> "$r + ${i}i"
                      else -> "$r − ${i}i"
                  }
              }

              private fun trim(v: Double): String {
                  return if (v == v.toLong().toDouble()) v.toLong().toString() else "%.6f".format(v).trimEnd('0').trimEnd('.')
              }
          }

