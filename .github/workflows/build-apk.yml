          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityQuadraticEquationBinding
          import kotlin.math.sqrt

          class QuadraticEquationActivity : AppCompatActivity() {
              private lateinit var binding: ActivityQuadraticEquationBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityQuadraticEquationBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }
                  binding.btnCalc.setOnClickListener { calc() }
              }

              private fun calc() {
                  val a = binding.etA.text.toString().toDoubleOrNull()
                  val b = binding.etB.text.toString().toDoubleOrNull()
                  val c = binding.etC.text.toString().toDoubleOrNull()
                  if (a == null || b == null || c == null) {
                      binding.tvResult.text = "Vui lòng nhập đủ hệ số a, b, c."
                      return
                  }
                  if (a == 0.0) {
                      binding.tvResult.text = "a = 0 → đây là phương trình bậc nhất, không phải bậc hai."
                      return
                  }
                  val delta = b * b - 4 * a * c
                  binding.tvResult.text = when {
                      delta > 0 -> {
                          val x1 = (-b + sqrt(delta)) / (2 * a)
                          val x2 = (-b - sqrt(delta)) / (2 * a)
                          "Δ = ${format(delta)} > 0 → phương trình có 2 nghiệm phân biệt:\nx₁ = ${format(x1)}\nx₂ = ${format(x2)}"
                      }
                      delta == 0.0 -> {
                          val x = -b / (2 * a)
                          "Δ = 0 → phương trình có nghiệm kép:\nx = ${format(x)}"
                      }
                      else -> {
                          val re = -b / (2 * a)
                          val im = sqrt(-delta) / (2 * a)
                          "Δ = ${format(delta)} < 0 → phương trình vô nghiệm thực.\nNghiệm phức: x = ${format(re)} ± ${format(im)}i"
                      }
                  }
              }

              private fun format(v: Double): String {
                  return if (v == v.toLong().toDouble()) v.toLong().toString()
                  else "%.6f".format(v).trimEnd('0').trimEnd('.')
              }
          }

