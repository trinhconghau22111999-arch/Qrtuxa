          # ===== app/src/main/java/com/example/calculator/GeometryActivity.kt =====
          cat > app/src/main/java/com/example/calculator/GeometryActivity.kt <<'EOF'
          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityGeometryBinding
          import kotlin.math.PI
          import kotlin.math.pow
          import kotlin.math.sqrt

          class GeometryActivity : AppCompatActivity() {
              private lateinit var binding: ActivityGeometryBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityGeometryBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }

                  binding.btnCube.setOnClickListener {
                      val a = d1()
                      binding.tvResult.text = if (a == null) needInput() else "Thể tích lập phương = a³ = ${trim(a.pow(3))}"
                  }
                  binding.btnBox.setOnClickListener {
                      val a = d1(); val b = d2(); val c = d3()
                      binding.tvResult.text = if (a == null || b == null || c == null) needInput()
                      else "Thể tích hộp chữ nhật = a×b×c = ${trim(a * b * c)}"
                  }
                  binding.btnCylinder.setOnClickListener {
                      val r = d1(); val h = d2()
                      binding.tvResult.text = if (r == null || h == null) needInput()
                      else "Thể tích hình trụ = πr²h = ${trim(PI * r * r * h)}"
                  }
                  binding.btnCone.setOnClickListener {
                      val r = d1(); val h = d2()
                      binding.tvResult.text = if (r == null || h == null) needInput()
                      else "Thể tích hình nón = ⅓πr²h = ${trim(PI * r * r * h / 3.0)}"
                  }
                  binding.btnSphere.setOnClickListener {
                      val r = d1()
                      binding.tvResult.text = if (r == null) needInput()
                      else "Thể tích hình cầu = 4/3·πr³ = ${trim(4.0 / 3.0 * PI * r.pow(3))}"
                  }
                  binding.btnPyramid.setOnClickListener {
                      val sDay = d1(); val h = d2()
                      binding.tvResult.text = if (sDay == null || h == null) needInput()
                      else "Thể tích hình chóp = ⅓·S đáy·h = ${trim(sDay * h / 3.0)}"
                  }
                  binding.btnCoord.setOnClickListener { calcCoord() }
              }

              private fun needInput() = "Vui lòng nhập đủ các giá trị cần thiết ở trên."

              private fun d1() = binding.etDim1.text.toString().toDoubleOrNull()
              private fun d2() = binding.etDim2.text.toString().toDoubleOrNull()
              private fun d3() = binding.etDim3.text.toString().toDoubleOrNull()

              private fun calcCoord() {
                  val a = parsePoint(binding.etPointA.text.toString())
                  val b = parsePoint(binding.etPointB.text.toString())
                  if (a == null || b == null) {
                      binding.tvResult.text = "Vui lòng nhập tọa độ A, B dạng x, y, z hợp lệ."
                      return
                  }
                  val dist = sqrt((a[0]-b[0]).pow(2) + (a[1]-b[1]).pow(2) + (a[2]-b[2]).pow(2))
                  val mid = Triple((a[0]+b[0])/2, (a[1]+b[1])/2, (a[2]+b[2])/2)
                  binding.tvResult.text = "Khoảng cách AB = ${trim(dist)}\nTrung điểm AB = (${trim(mid.first)}, ${trim(mid.second)}, ${trim(mid.third)})"
              }

              private fun parsePoint(s: String): DoubleArray? {
                  return try {
                      val parts = s.split(",").map { it.trim().toDouble() }
                      if (parts.size < 2) return null
                      DoubleArray(3) { if (it < parts.size) parts[it] else 0.0 }
                  } catch (e: Exception) { null }
              }

              private fun trim(v: Double): String {
                  return if (v == v.toLong().toDouble()) v.toLong().toString()
                  else "%.6f".format(v).trimEnd('0').trimEnd('.')
              }
          }

          EOF

          # ===== app/src/main/java/com/example/calculator/IntegerToolsActivity.kt =====
          cat > app/src/main/java/com/example/calculator/IntegerToolsActivity.kt <<'EOF'
          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityIntegerToolsBinding

          class IntegerToolsActivity : AppCompatActivity() {
              private lateinit var binding: ActivityIntegerToolsBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityIntegerToolsBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }
                  binding.btnCalc.setOnClickListener { calc() }
              }

              private fun calc() {
                  val a = binding.etA.text.toString().toLongOrNull()
                  val b = binding.etB.text.toString().toLongOrNull()
                  if (a == null || b == null) {
                      binding.tvResult.text = "Vui lòng nhập đủ hai số nguyên hợp lệ."
                      return
                  }
                  val gcd = MathUtils.gcd(a, b)
                  val lcm = MathUtils.lcm(a, b)
                  val chia = if (b != 0L) {
                      if (a % b == 0L) "${a / b}" else "%.6f".format(a.toDouble() / b).trimEnd('0').trimEnd('.')
                  } else "không xác định (chia cho 0)"

                  binding.tvResult.text = """
                      a + b = ${a + b}
                      a − b = ${a - b}
                      a × b = ${a * b}
                      a ÷ b = $chia
                      ƯCLN(a, b) = $gcd
                      BCNN(a, b) = $lcm
                  """.trimIndent()
              }
          }

          EOF

