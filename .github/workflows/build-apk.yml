          package com.example.calculator

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.calculator.databinding.ActivityStatsBinding
          import kotlin.math.sqrt

          class StatsActivity : AppCompatActivity() {
              private lateinit var binding: ActivityStatsBinding

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityStatsBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.btnBack.setOnClickListener { finish() }
                  binding.btnStats.setOnClickListener { calcStats() }
                  binding.btnCombo.setOnClickListener { calcCombo() }
              }

              private fun calcStats() {
                  val data = try {
                      binding.etData.text.toString().split(",").map { it.trim().toDouble() }
                  } catch (e: Exception) { null }

                  if (data == null || data.isEmpty()) {
                      binding.tvResult.text = "Vui lòng nhập dãy số liệu hợp lệ."
                      return
                  }
                  val mean = data.average()
                  val variance = data.sumOf { (it - mean) * (it - mean) } / data.size
                  val std = sqrt(variance)

                  binding.tvResult.text = """
                      Số phần tử: ${data.size}
                      Trung bình: ${trim(mean)}
                      Phương sai: ${trim(variance)}
                      Độ lệch chuẩn: ${trim(std)}
                  """.trimIndent()
              }

              private fun calcCombo() {
                  val n = binding.etN.text.toString().toIntOrNull()
                  val r = binding.etR.text.toString().toIntOrNull()
                  if (n == null || r == null) {
                      binding.tvResult.text = "Vui lòng nhập n và r hợp lệ."
                      return
                  }
                  val fact = MathUtils.factorial(n)
                  val perm = MathUtils.nPr(n, r)
                  val comb = MathUtils.nCr(n, r)

                  binding.tvResult.text = """
                      n! = ${trim(fact)}
                      Chỉnh hợp Aₙʳ = ${trim(perm)}
                      Tổ hợp Cₙʳ = ${trim(comb)}
                  """.trimIndent()
              }

              private fun trim(v: Double): String {
                  if (v.isNaN()) return "không xác định"
                  return if (v == v.toLong().toDouble()) v.toLong().toString()
                  else "%.6f".format(v).trimEnd('0').trimEnd('.')
              }
          }

