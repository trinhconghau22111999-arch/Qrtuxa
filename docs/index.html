<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quét QR/mã vạch gửi vào máy tính</title>
<style>
  html,body{margin:0;height:100%;background:#111;color:#eee;font-family:-apple-system,Segoe UI,Arial,sans-serif;}
  #wrap{display:flex;flex-direction:column;align-items:center;padding:16px;}
  #readerWrap{position:relative;width:100%;max-width:420px;}
  #scanFlash {
    position:absolute; inset:0; z-index:30; pointer-events:none;
    background: radial-gradient(circle, rgba(192,38,255,0.9), rgba(139,45,255,0.6));
    opacity:0; border-radius:12px;
  }
  #reader{width:100%;border-radius:12px;overflow:hidden;}
  #status{margin-top:14px;font-size:14px;text-align:center;color:#9ada9a;min-height:20px;}
  #err{color:#f28b8b;font-size:13px;margin-top:8px;text-align:center;}
  h2{font-size:16px;margin:10px 0;}
  #flashBtn {
    position:absolute; top:10px; right:10px; z-index:20;
    padding:8px 14px; border-radius:20px; border:1px solid rgba(255,255,255,0.4);
    background:rgba(0,0,0,0.55); color:#eee; font-size:13px; cursor:pointer; display:none;
    backdrop-filter: blur(2px);
  }
  #flashBtn.on { background:#ffd93d; color:#111; border-color:#ffd93d; font-weight:600; }
  #zoomRow {
    position:absolute; bottom:10px; left:10px; right:10px; z-index:20;
    display:none; align-items:center; gap:8px;
    background:rgba(0,0,0,0.55); border-radius:20px; padding:6px 14px;
    backdrop-filter: blur(2px);
  }
  #zoomRow span { font-size:13px; }
  #zoomSlider { flex:1; }
  #startBtn {
    margin-top:20px; padding:16px 32px; border-radius:28px; border:none;
    background:linear-gradient(135deg,#8b2dff,#c026ff); color:#fff; font-size:16px;
    font-weight:600; cursor:pointer; box-shadow:0 0 20px rgba(192,38,255,0.5);
  }
  #readerWrap, #flashRow { display:none; }
</style>
</head>
<body>
<div id="wrap">
  <h2>📷 Quét mã QR / mã vạch</h2>
  <div id="readerWrap">
    <div id="reader"></div>
    <div id="scanFlash"></div>
    <button id="flashBtn">⚡</button>
    <div id="zoomRow">
      <span>🔍</span>
      <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1" />
    </div>
  </div>
  <button id="startBtn">▶ Bắt đầu quét</button>
  <div id="status"></div>
  <div id="err"></div>
</div>

<script src="vendor/firebase-compat.js"></script>
<script src="vendor/html5-qrcode.min.js"></script>
<script>
window.FIREBASE_CONFIG = {
  apiKey: "AIzaSyCPwMKElbsQLjOeSVddGAfjNiHnPHV9b1A",
  authDomain: "qrremod.firebaseapp.com",
  databaseURL: "https://qrremod-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "qrremod",
  storageBucket: "qrremod.firebasestorage.app",
  messagingSenderId: "949360436062",
  appId: "1:949360436062:web:c9b5b5d47ee4f76fdce5cf"
};

const params = new URLSearchParams(location.search);
const session = params.get('session');
const statusEl = document.getElementById('status');
const errEl = document.getElementById('err');
const startBtn = document.getElementById('startBtn');
const readerWrap = document.getElementById('readerWrap');

if (!session) {
  errEl.textContent = 'Thiếu mã phiên (session). Hãy quét lại link/QR do máy tính tạo ra.';
  startBtn.style.display = 'none';
} else {
  try {
    firebase.initializeApp(window.FIREBASE_CONFIG);
  } catch (e) {
    errEl.textContent = 'Lỗi khởi tạo Firebase: ' + e.message;
  }
  const db = firebase.database();
  const dataRef = db.ref('sessions/' + session + '/data');

  // "Lam nong" ket noi WebSocket ngay tu dau, khong cho toi luc quet moi ket noi
  // -> lan quet dau tien cung nhanh nhu cac lan sau, khong bi tre do bat tay ket noi
  db.ref('.info/connected').on('value', () => {});

  let lastText = null; // chi nho ma QR gan nhat da gui, khong nho toan bo lich su

  // ====== Doc to "Ớ" khi gui du lieu thanh cong ======
  let audioUnlocked = false;
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    try {
      // Noi mot cau rong de "mo khoa" speechSynthesis ngay trong cu cham cua nguoi dung
      const warm = new SpeechSynthesisUtterance('');
      warm.volume = 0;
      window.speechSynthesis.speak(warm);
    } catch (e) {}
  }

  function playBeep() {
    try {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance('Ớ');
      utter.lang = 'vi-VN';
      utter.rate = 2;
      utter.pitch = 1.1;
      utter.volume = 1;
      window.speechSynthesis.speak(utter);
    } catch (e) {}
  }

  // ====== Hieu ung nhay tim neon + rung, chay tren GPU nen khong lam cham vong quet ======
  const scanFlash = document.getElementById('scanFlash');
  function flashEffect() {
    // Rung 1 phat ngan (khong block, khong await)
    try { if (navigator.vibrate) navigator.vibrate(80); } catch (e) {}

    // Nhay man hinh: bat opacity ngay, roi cho CSS tu fade ve 0 (khong dung setTimeout de tranh giu luong)
    scanFlash.style.transition = 'none';
    scanFlash.style.opacity = '0.85';
    requestAnimationFrame(() => {
      scanFlash.style.transition = 'opacity 220ms ease-out';
      scanFlash.style.opacity = '0';
    });
  }

  // Chi chap nhan chu, so, khoang trang va dau "_". Bat ky ky tu dac biet nao khac -> coi nhu chua quet.
  function isAllowedText(text) {
    return /^[\p{L}\p{N}_\s]*$/u.test(text);
  }

  function onScanSuccess(decodedText) {
    if (!isAllowedText(decodedText)) return; // ma chua ky tu khong hop le -> bo qua hoan toan, coi nhu chua quet
    if (decodedText === lastText) return;
    lastText = decodedText;
    flashEffect(); // kich hoat ngay, khong cho phan hoi Firebase

    dataRef.set({ text: decodedText + '\n', ts: Date.now() })
      .then(() => {
        statusEl.textContent = 'Đã gửi: ' + decodedText.slice(0, 40);
        playBeep();
      })
      .catch(e => { errEl.textContent = 'Lỗi gửi dữ liệu: ' + e.message; });
  }

  const qr = new Html5Qrcode('reader', {
    formatsToSupport: [
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.CODE_93,
      Html5QrcodeSupportedFormats.CODABAR,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.DATA_MATRIX,
      Html5QrcodeSupportedFormats.PDF_417,
      Html5QrcodeSupportedFormats.AZTEC
    ]
  });
  let started = false;
  let stallTimer = null;

  function markStarted() {
    started = true;
    if (stallTimer) clearTimeout(stallTimer);
    statusEl.textContent = 'Sẵn sàng quét...';
    setupFlashButton();
    setupZoomSlider();
  }

  const zoomRow = document.getElementById('zoomRow');
  const zoomSlider = document.getElementById('zoomSlider');

  function setupZoomSlider() {
    try {
      const capabilities = qr.getRunningTrackCapabilities();
      if (capabilities && capabilities.zoom) {
        zoomSlider.min = capabilities.zoom.min || 1;
        zoomSlider.max = capabilities.zoom.max || 5;
        zoomSlider.step = capabilities.zoom.step || 0.1;
        zoomSlider.value = capabilities.zoom.min || 1;
        zoomRow.style.display = 'flex';
      } else {
        zoomRow.style.display = 'none';
      }
    } catch (e) {
      zoomRow.style.display = 'none';
    }
  }

  zoomSlider.addEventListener('input', () => {
    const zoomVal = parseFloat(zoomSlider.value);
    qr.applyVideoConstraints({ advanced: [{ zoom: zoomVal }] }).catch(() => {});
  });

  const flashBtn = document.getElementById('flashBtn');
  let flashOn = false;

  function setupFlashButton() {
    try {
      const capabilities = qr.getRunningTrackCapabilities();
      if (capabilities && capabilities.torch) {
        flashBtn.style.display = 'inline-block';
      }
    } catch (e) {
      flashBtn.style.display = 'none';
    }
  }

  flashBtn.onclick = () => {
    flashOn = !flashOn;
    qr.applyVideoConstraints({ advanced: [{ torch: flashOn }] })
      .then(() => { flashBtn.classList.toggle('on', flashOn); })
      .catch(e => {
        flashOn = !flashOn;
        errEl.textContent = 'Không bật/tắt được đèn flash: ' + (e && e.message ? e.message : e);
      });
  };

  function tryStart(cameraConfig) {
    return qr.start(
      cameraConfig,
      {
        fps: 15, // toc do nhan dien ma
        // Khong dat qrbox co dinh: quet toan bo khung hinh, giup bat duoc ma nho/o xa
        // xuat hien o bat ky vi tri nao trong khung hinh, khong chi vung giua
        videoConstraints: {
          ...cameraConfig,
          width: { ideal: 4096 },  // dat rat cao de trinh duyet tu chon do phan giai TOI DA camera ho tro
          height: { ideal: 4096 },
          advanced: [{ focusMode: 'continuous' }] // lay net tu dong lien tuc
        }
      },
      onScanSuccess,
      () => {}
    ).then(markStarted);
  }

  // Chi bat dau moi thu (camera + mo khoa am thanh) sau khi nguoi dung bam nut,
  // dam bao trinh duyet cho phep phat giong noi tu dong sau nay.
  startBtn.onclick = () => {
    unlockAudio();
    startBtn.style.display = 'none';
    readerWrap.style.display = 'block';
    statusEl.textContent = 'Đang khởi động camera...';

    stallTimer = setTimeout(() => {
      if (!started) {
        errEl.textContent = 'Camera không phản hồi. Hãy kiểm tra: (1) đã cho phép quyền Camera cho trang này trong Cài đặt trình duyệt, (2) không có app khác đang chiếm camera, (3) thử tải lại trang.';
      }
    }, 8000);

    tryStart({ facingMode: 'environment' })
      .catch(() => tryStart({ facingMode: 'user' }))
      .catch(e => {
        if (stallTimer) clearTimeout(stallTimer);
        errEl.textContent = 'Không mở được camera: ' + (e && e.message ? e.message : e) +
          '. Hãy vào Cài đặt trình duyệt → Quyền trang web → cho phép Camera, rồi tải lại trang.';
      });
  };
}
</script>
</body>
</html>
