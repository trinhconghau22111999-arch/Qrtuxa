<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>QR Remote Browser</title>
<style>
  :root {
    --bg-deep: #000000;
    --bg-panel: #000000;
    --neon-1: #c026ff;
    --neon-2: #8b2dff;
    --neon-3: #4d0bff;
    --neon-soft: #d9b3ff;
    --text: #ffffff;
  }
  html, body {
    margin:0; padding:0; height:100%;
    font-family: -apple-system, Segoe UI, Arial, sans-serif;
    background: #000000;
    color: var(--text);
  }
  #toolbar {
    display:flex; align-items:center; gap:6px; padding:5px 8px;
    background: #000000;
    border-bottom: 1px solid var(--neon-1);
    box-shadow: 0 0 12px rgba(192,38,255,0.4);
  }
  #toolbar button {
    background: #000000;
    color: var(--text); border: 1px solid var(--neon-1);
    padding:4px 9px; border-radius:6px; cursor:pointer;
    font-size:12px;
    transition: all .15s ease;
  }
  #toolbar button:hover {
    border-color: var(--neon-1);
    box-shadow: 0 0 12px rgba(192,38,255,0.6);
    color: #fff;
  }
  #bookmarksBar {
    display:flex; align-items:center; gap:5px; padding:3px 8px;
    background: #000000;
    border-bottom: 1px solid rgba(192,38,255,0.5);
    overflow-x:auto; white-space:nowrap;
    min-height:10px;
  }
  #bookmarksBar::-webkit-scrollbar { height:4px; }
  #bookmarksBar::-webkit-scrollbar-thumb { background: rgba(192,38,255,0.4); border-radius:4px; }
  #bookmarksEmpty { font-size:10px; color:#a879e0; }
  .bm-item {
    display:flex; align-items:center; gap:6px;
    background: #000000;
    border:1px solid rgba(192,38,255,0.5);
    border-radius:14px; padding:3px 5px 3px 10px;
    font-size:11px; color: var(--text); cursor:pointer;
    transition: all .15s ease; flex-shrink:0;
  }
  .bm-item:hover { border-color: var(--neon-1); box-shadow:0 0 8px rgba(192,38,255,0.4); }
  .bm-item .bm-del {
    width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    color:#c7a8ff; font-size:11px; line-height:1;
  }
  .bm-item .bm-del:hover { color:#fff; background:rgba(255,60,90,0.6); }
  #urlbarWrap { position:relative; flex:1; display:flex; align-items:center; }
  #urlbarWrap #urlbar { flex:1; padding-right:36px; }
  #addBookmarkBtn {
    position:absolute; right:4px; top:50%; transform:translateY(-50%);
    width:20px; height:20px; border-radius:50%;
    border:1px solid var(--neon-1); background:#000000;
    color: var(--neon-soft); cursor:pointer; font-size:12px; display:flex;
    align-items:center; justify-content:center; transition: all .15s ease;
  }
  #addBookmarkBtn:hover { background:rgba(192,38,255,0.35); color:#fff; }
  #bookmarkModalOverlay {
    position:fixed; inset:0; background:rgba(8,4,16,0.6); z-index:40; display:none;
    align-items:flex-start; justify-content:center;
  }
  #bookmarkModalOverlay.show { display:flex; }
  #bookmarkModal {
    margin-top:64px; width:280px;
    background: #000000;
    border:1px solid var(--neon-1);
    border-radius:14px; padding:16px;
    box-shadow: 0 0 30px rgba(192,38,255,0.5), 0 8px 24px rgba(0,0,0,.5);
  }
  #bookmarkModal h3 {
    margin:0 0 10px 0; font-size:14px;
    background: linear-gradient(90deg, var(--neon-1), var(--neon-soft));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  #bookmarkNameInput {
    width:100%; box-sizing:border-box; padding:8px 10px; border-radius:8px;
    border:1px solid rgba(192,38,255,0.5); background:#000000; color:var(--text);
    outline:none; font-size:13px;
  }
  #bookmarkNameInput:focus { border-color: var(--neon-1); box-shadow:0 0 10px rgba(192,38,255,0.5); }
  #bookmarkModalActions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; }
  #bookmarkModalActions button {
    padding:7px 14px; border-radius:8px; cursor:pointer; font-size:12px;
    border:1px solid rgba(192,38,255,0.4); background: rgba(139,45,255,0.12); color:var(--text);
  }
  #saveBookmarkBtn {
    background: linear-gradient(135deg, var(--neon-1), var(--neon-3)); border:none; color:#fff; font-weight:600;
  }
  #urlbar {
    flex:1; padding:5px 10px; border-radius:6px;
    border:1px solid var(--neon-1);
    background: #000000; color: var(--text);
    outline:none; font-size:12px;
  }
  #urlbar:focus {
    border-color: var(--neon-1);
    box-shadow: 0 0 10px rgba(192,38,255,0.5);
  }
  #qrBtn {
    background: linear-gradient(135deg, var(--neon-1), var(--neon-3));
    border: none; font-weight:600;
    box-shadow: 0 0 14px rgba(192,38,255,0.55);
  }
  #qrBtn:hover {
    box-shadow: 0 0 22px rgba(192,38,255,0.9);
    filter: brightness(1.1);
  }
  #webviewWrap { position:relative; height: calc(100% - 62px); }
  webview { width:100%; height:100%; }
  #qrPanel {
    position:absolute; top:14px; right:14px; width:280px;
    background: #000000;
    border:1px solid var(--neon-1);
    border-radius:14px; padding:16px; display:none; z-index:10;
    box-shadow: 0 0 30px rgba(192,38,255,0.5), 0 8px 24px rgba(0,0,0,.5);
  }
  #qrPanel.show { display:block; }
  #qrPanel canvas {
    width:100%; height:auto; background:#fff; border-radius:8px;
    box-shadow: 0 0 16px rgba(192,38,255,0.4);
  }
  #qrLinkRow { display:flex; align-items:center; gap:6px; margin-top:10px; }
  #qrLink { font-size:11px; word-break:break-all; color: var(--neon-soft); flex:1; min-width:0; }
  #copyLinkBtn {
    flex-shrink:0; width:28px; height:28px; border-radius:6px;
    border:1px solid rgba(192,38,255,0.5); background:rgba(192,38,255,0.15);
    color: var(--neon-soft); cursor:pointer; font-size:13px; display:flex;
    align-items:center; justify-content:center; transition: all .15s ease;
  }
  #copyLinkBtn:hover { background:rgba(192,38,255,0.35); color:#fff; }
  #copyLinkBtn.copied { background:#2fbf71; border-color:#2fbf71; color:#fff; }
  #qrStatus { font-size:12px; color:#7effc0; margin-top:8px; }
  #qrPanel h3 {
    margin:0 0 10px 0; font-size:14px; letter-spacing:.3px;
    background: linear-gradient(90deg, var(--neon-1), var(--neon-soft));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  #brand {
    font-weight:700; font-size:14px; white-space:nowrap; margin-right:6px;
    background: linear-gradient(90deg, var(--neon-1), var(--neon-soft));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:.2px;
  }
  #closeQr { position:absolute; top:10px; right:12px; cursor:pointer; color:#c7a8ff; }
  #closeQr:hover { color:#fff; }
  #refreshQr { position:absolute; top:10px; right:34px; cursor:pointer; color:#c7a8ff; }
  #refreshQr:hover { color:#fff; }
</style>
</head>
<body>
  <div id="toolbar">
    <span id="brand">Hậu-GHN</span>
    <button id="backBtn">◀</button>
    <button id="fwdBtn">▶</button>
    <button id="reloadBtn">⟳</button>
    <div id="urlbarWrap">
      <input id="urlbar" value="https://www.google.com" />
      <button id="addBookmarkBtn" title="Lưu trang hiện tại vào dấu trang">＋</button>
    </div>
    <button id="qrBtn">📱 Chia sẻ QR</button>
  </div>

  <div id="bookmarksBar">
    <span id="bookmarksEmpty">Chưa có dấu trang nào — bấm ＋ ở thanh địa chỉ để lưu.</span>
  </div>

  <div id="bookmarkModalOverlay">
    <div id="bookmarkModal">
      <h3>Lưu dấu trang</h3>
      <input id="bookmarkNameInput" type="text" placeholder="Tên dấu trang" />
      <div id="bookmarkModalActions">
        <button id="cancelBookmarkBtn">Hủy</button>
        <button id="saveBookmarkBtn">Lưu</button>
      </div>
    </div>
  </div>

  <div id="webviewWrap">
    <webview id="wv" src="https://www.google.com" partition="persist:browse"></webview>

    <div id="qrPanel">
      <span id="refreshQr" title="Tạo mã QR mới (mã cũ sẽ ngừng hoạt động)">⟳</span>
      <span id="closeQr">✕</span>
      <h3>Quét bằng điện thoại</h3>
      <canvas id="qrCanvas"></canvas>
      <div id="qrLinkRow">
        <a id="qrLink" href="#" target="_blank"></a>
        <button id="copyLinkBtn" title="Sao chép đường dẫn">⧉</button>
      </div>
      <div id="qrStatus">Đang chờ dữ liệu quét...</div>
    </div>
  </div>

  <script src="vendor/firebase-compat.js"></script>
  <script src="vendor/qrcode.min.js"></script>
  <script>
  window.FIREBASE_CONFIG = {
    apiKey: "AIzaSyCPwMKElbsQLjOeSVddGAfjNiHnPHV9b1A",
    authDomain: "qrremod.firebaseapp.com",
    databaseURL: "https://qrremod-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "qrremod",
    storageBucket: "qrremod.firebasestorage.app",
    messagingSenderId: "949360436062",
    appId: "1:949360436062:web:c9b5b5d47ee4f76fdce5cf"
  };
  window.MOBILE_SCAN_URL = "https://trinhconghau22111999-arch.github.io/Qrtuxa/";

  const wv = document.getElementById('wv');
  const urlbar = document.getElementById('urlbar');

  function normalizeUrl(v) {
    v = v.trim();
    if (!v) return 'https://www.google.com';
    if (/^https?:\/\//i.test(v)) return v;
    if (v.includes('.') && !v.includes(' ')) return 'https://' + v;
    return 'https://www.google.com/search?q=' + encodeURIComponent(v);
  }

  urlbar.addEventListener('keydown', e => { if (e.key === 'Enter') wv.loadURL(normalizeUrl(urlbar.value)); });
  document.getElementById('backBtn').onclick = () => wv.canGoBack() && wv.goBack();
  document.getElementById('fwdBtn').onclick = () => wv.canGoForward() && wv.goForward();
  document.getElementById('reloadBtn').onclick = () => wv.reload();
  wv.addEventListener('did-navigate', e => urlbar.value = e.url);
  wv.addEventListener('did-navigate-in-page', e => urlbar.value = e.url);

  // ====== Ctrl + lan chuot de phong to/thu nho trang dang xem ======
  // webview khong chuyen tiep su kien wheel ra ngoai host, nen phai tiem 1 doan
  // script nho vao CHINH trang dang tai (chi dung DOM/CSS thuan, khong can
  // quyen Node/Electron ben trong trang khach) va chay lai moi khi trang do tai xong.
  function buildCtrlWheelZoomScript() {
    const fn = function () {
      if (window.__ctrlWheelZoomInstalled) return;
      window.__ctrlWheelZoomInstalled = true;
      let zoom = 1;
      window.addEventListener('wheel', function (e) {
        if (!e.ctrlKey) return;
        e.preventDefault();
        const step = 0.1;
        zoom = e.deltaY < 0 ? Math.min(zoom + step, 3) : Math.max(zoom - step, 0.3);
        document.documentElement.style.zoom = zoom;
      }, { passive: false });
    };
    return `(${fn.toString()})();`;
  }

  wv.addEventListener('dom-ready', () => {
    wv.executeJavaScript(buildCtrlWheelZoomScript()).catch(() => {});
  });

  function sanitizeText(text) {
    if (typeof text !== 'string') return '';
    return text.replace(/[^\p{L}\p{N}_\s]/gu, '');
  }

  function buildInjectionScript(text) {
    const fn = function (t) {
      const el = document.activeElement;
      if (!el) return false;
      try {
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
          const start = el.selectionStart ?? el.value.length;
          const end = el.selectionEnd ?? el.value.length;
          el.setRangeText(t, start, end, 'end');
          el.dispatchEvent(new Event('input', { bubbles: true }));
          el.dispatchEvent(new Event('change', { bubbles: true }));
          return true;
        }
        if (el.isContentEditable) {
          document.execCommand('insertText', false, t);
          return true;
        }
      } catch (e) {}
      return false;
    };
    return `(${fn.toString()})(${JSON.stringify(text)});`;
  }

  function injectIntoWebview(rawText) {
    const clean = sanitizeText(rawText);
    if (!clean) return;
    wv.executeJavaScript(buildInjectionScript(clean))
      .then(() => sendAutoConfirmKeys())
      .catch(() => {});
  }

  // ====== Gui phim Enter THAT o tang he thong (Chromium coi nhu ban phim that,
  // khong phai su kien JS gia) ======
  function sendAutoConfirmKeys() {
    try {
      wv.focus();
      // Gui ngay, khong cho them 1 khung hinh nua -> giam do tre cam nhan duoc.
      wv.sendInputEvent({ type: 'keyDown', keyCode: 'Enter' });
      wv.sendInputEvent({ type: 'char', keyCode: 'Enter' });
      wv.sendInputEvent({ type: 'keyUp', keyCode: 'Enter' });
    } catch (e) {
      qrStatus.textContent = 'Lỗi gửi Enter: ' + e.message;
    }
  }

  let db = null;
  try {
    firebase.initializeApp(window.FIREBASE_CONFIG);
    db = firebase.database();
  } catch (e) {
    console.error('Firebase init error:', e);
  }

  let currentSession = null;
  let sessionRef = null;
  let lastTs = 0;

  function genSessionId() {
    return 'sess_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
  }

  const qrPanel = document.getElementById('qrPanel');
  const qrCanvas = document.getElementById('qrCanvas');
  const qrLink = document.getElementById('qrLink');
  const copyLinkBtn = document.getElementById('copyLinkBtn');
  const qrStatus = document.getElementById('qrStatus');

  document.getElementById('qrBtn').onclick = () => {
    if (currentSession && sessionRef) {
      qrPanel.classList.add('show'); // session cu van con song, chi mo lai khung
    } else {
      startSession();
    }
  };
  document.getElementById('closeQr').onclick = () => hideQrPanel();
  document.getElementById('refreshQr').onclick = () => startSession();

  function hideQrPanel() {
    qrPanel.classList.remove('show'); // chi an giao dien, KHONG xoa session tren Firebase
  }

  function startSession() {
    try {
      if (typeof QRCode === 'undefined') {
        qrStatus.textContent = 'Lỗi: thư viện QRCode chưa tải được (kiểm tra mạng internet).';
        qrPanel.classList.add('show');
        return;
      }
      if (typeof firebase === 'undefined') {
        qrStatus.textContent = 'Lỗi: thư viện Firebase chưa tải được (kiểm tra mạng internet).';
        qrPanel.classList.add('show');
        return;
      }

      if (!db) {
        qrStatus.textContent = 'Lỗi: Firebase chưa khởi tạo được (kiểm tra firebaseConfig).';
        qrPanel.classList.add('show');
        return;
      }

      stopSession();
      currentSession = genSessionId();
      const link = `${window.MOBILE_SCAN_URL}?session=${currentSession}`;

      QRCode.toCanvas(qrCanvas, link, { width: 250, margin: 1 }, (err) => {
        if (err) qrStatus.textContent = 'Lỗi vẽ QR: ' + err.message;
      });
      qrLink.href = link;
      qrLink.textContent = link;
      copyLinkBtn.onclick = () => {
        navigator.clipboard.writeText(link).then(() => {
          copyLinkBtn.classList.add('copied');
          copyLinkBtn.textContent = '✓';
          setTimeout(() => {
            copyLinkBtn.classList.remove('copied');
            copyLinkBtn.textContent = '⧉';
          }, 1200);
        }).catch(() => {
          qrStatus.textContent = 'Không sao chép được, hãy tự chọn và copy link.';
        });
      };
      qrStatus.textContent = 'Đang chờ dữ liệu quét...';
      qrPanel.classList.add('show');

      sessionRef = db.ref('sessions/' + currentSession);
      sessionRef.set({ createdAt: firebase.database.ServerValue.TIMESTAMP })
        .catch(e => { qrStatus.textContent = 'Lỗi ghi Firebase: ' + e.message; });

      sessionRef.child('data').on('value', snap => {
        const val = snap.val();
        if (!val || !val.text) return;
        if (val.ts && val.ts === lastTs) return;
        lastTs = val.ts || Date.now();
        qrStatus.textContent = 'Đã nhận: ' + sanitizeText(val.text).slice(0, 40);
        injectIntoWebview(val.text);
      }, (err) => {
        qrStatus.textContent = 'Lỗi lắng nghe Firebase: ' + err.message;
      });
    } catch (e) {
      qrStatus.textContent = 'Lỗi: ' + e.message;
      qrPanel.classList.add('show');
    }
  }

  function stopSession() {
    if (sessionRef) {
      sessionRef.child('data').off();
      sessionRef.remove().catch(() => {});
    }
    sessionRef = null;
    currentSession = null;
    lastTs = 0;
    qrPanel.classList.remove('show');
  }

  // ====== Thanh dau trang cho may tinh ======
  // Uu tien luu xuong 1 file JSON that tren o dia cua may (qua Node fs cua Electron),
  // de chac chan moi may tinh co danh sach dau trang RIENG, khong lien quan gi den
  // mang/Firebase va khong bi anh huong boi viec xoa cache trinh duyet.
  // Neu khong co quyen truy cap Node (vd chay thu trong trinh duyet thuong) thi
  // tu dong lui ve dung localStorage cua may do.
  const BOOKMARKS_KEY = 'ghn_browser_bookmarks';
  let nodeFS = null;
  let bookmarksFilePath = null;
  try {
    const fs = require('fs');
    const os = require('os');
    const path = require('path');
    const dir = path.join(os.homedir(), '.ghn-browser');
    if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
    bookmarksFilePath = path.join(dir, 'bookmarks.json');
    nodeFS = fs;
  } catch (e) {
    nodeFS = null; // khong co Node trong renderer nay -> dung localStorage
  }

  const bookmarksBar = document.getElementById('bookmarksBar');
  const bookmarksEmpty = document.getElementById('bookmarksEmpty');
  const addBookmarkBtn = document.getElementById('addBookmarkBtn');
  const bookmarkModalOverlay = document.getElementById('bookmarkModalOverlay');
  const bookmarkNameInput = document.getElementById('bookmarkNameInput');
  const saveBookmarkBtn = document.getElementById('saveBookmarkBtn');
  const cancelBookmarkBtn = document.getElementById('cancelBookmarkBtn');

  function loadBookmarks() {
    if (nodeFS && bookmarksFilePath) {
      try {
        if (!nodeFS.existsSync(bookmarksFilePath)) return [];
        const raw = nodeFS.readFileSync(bookmarksFilePath, 'utf8');
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }
    try {
      const raw = localStorage.getItem(BOOKMARKS_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveBookmarks(list) {
    if (nodeFS && bookmarksFilePath) {
      try {
        nodeFS.writeFileSync(bookmarksFilePath, JSON.stringify(list, null, 2), 'utf8');
        return;
      } catch (e) { /* rơi xuống localStorage nếu ghi file lỗi */ }
    }
    try { localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(list)); } catch (e) {}
  }

  function shortTitle(title, url) {
    const t = (title || '').trim();
    if (t) return t.length > 22 ? t.slice(0, 22) + '…' : t;
    try {
      return new URL(url).hostname.replace(/^www\./, '');
    } catch (e) {
      return url.slice(0, 22);
    }
  }

  function renderBookmarks() {
    const list = loadBookmarks();
    bookmarksBar.querySelectorAll('.bm-item').forEach(el => el.remove());
    bookmarksEmpty.style.display = list.length ? 'none' : 'inline';

    list.forEach((bm, idx) => {
      const item = document.createElement('div');
      item.className = 'bm-item';
      item.title = bm.url;

      const label = document.createElement('span');
      label.textContent = shortTitle(bm.title, bm.url);
      item.appendChild(label);

      const del = document.createElement('span');
      del.className = 'bm-del';
      del.textContent = '✕';
      del.title = 'Xóa dấu trang';
      del.onclick = (e) => {
        e.stopPropagation();
        const cur = loadBookmarks();
        cur.splice(idx, 1);
        saveBookmarks(cur);
        renderBookmarks();
      };
      item.appendChild(del);

      item.onclick = () => {
        wv.loadURL(bm.url);
        urlbar.value = bm.url;
      };

      bookmarksBar.appendChild(item);
    });
  }

  // ====== Hop thoai dat ten dau trang ======
  let pendingBookmarkUrl = null;

  function openBookmarkModal() {
    const url = (wv.getURL && wv.getURL()) || urlbar.value;
    if (!url) return;
    if (loadBookmarks().some(b => b.url === url)) return; // da co san, khong them trung

    pendingBookmarkUrl = url;
    let pageTitle = '';
    try { pageTitle = (wv.getTitle && wv.getTitle()) || ''; } catch (e) {}
    bookmarkNameInput.value = shortTitle(pageTitle, url);
    bookmarkModalOverlay.classList.add('show');
    bookmarkNameInput.focus();
    bookmarkNameInput.select();
  }

  function closeBookmarkModal() {
    bookmarkModalOverlay.classList.remove('show');
    pendingBookmarkUrl = null;
  }

  function confirmSaveBookmark() {
    if (!pendingBookmarkUrl) return;
    const name = bookmarkNameInput.value.trim() || shortTitle('', pendingBookmarkUrl);
    const list = loadBookmarks();
    if (!list.some(b => b.url === pendingBookmarkUrl)) {
      list.push({ title: name, url: pendingBookmarkUrl });
      saveBookmarks(list);
      renderBookmarks();
    }
    closeBookmarkModal();
  }

  addBookmarkBtn.onclick = openBookmarkModal;
  saveBookmarkBtn.onclick = confirmSaveBookmark;
  cancelBookmarkBtn.onclick = closeBookmarkModal;
  bookmarkModalOverlay.onclick = (e) => { if (e.target === bookmarkModalOverlay) closeBookmarkModal(); };
  bookmarkNameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmSaveBookmark();
    if (e.key === 'Escape') closeBookmarkModal();
  });

  renderBookmarks();
  </script>
</body>
</html>
