<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Qrtuxa Scanner</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

h1{
  margin:20px 0 10px;
  color:#22d3ee;
}

#reader{
  width:90vw;
  max-width:400px;
  border:3px solid #22d3ee;
  border-radius:14px;
  overflow:hidden;
  background:#000;
}

#status{
  margin:15px 0;
  padding:12px;
  width:90vw;
  max-width:400px;
  background:#111827;
  border-radius:10px;
  text-align:center;
  font-size:14px;
  line-height:1.4;
}

button{
  margin:8px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

#startBtn{ background:#22c55e; color:#fff; }
#flashBtn{ background:#f59e0b; color:#fff; }

.ok{ color:#4ade80; }
.err{ color:#f87171; }
</style>
</head>
<body>

<h1>📷 Qrtuxa Scanner</h1>

<div id="reader"></div>

<div id="status">
Đang kiểm tra phiên làm việc...
</div>

<button id="startBtn">▶ Bắt đầu quét</button>
<button id="flashBtn">💡 Đèn flash</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
// ===== Firebase =====
firebase.initializeApp({
  apiKey: "AIzaSyCPwMKElbsQLjOeSVddGAfjNiHnPHV9b1A",
  authDomain: "qrremod.firebaseapp.com",
  databaseURL: "https://qrremod-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "qrremod",
  storageBucket: "qrremod.firebasestorage.app",
  messagingSenderId: "949360436062",
  appId: "1:949360436062:web:c9b5b5d47ee4f76fdce5cf"
});

const db = firebase.database();
const statusEl = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const flashBtn = document.getElementById("flashBtn");

// ===== Lấy session từ URL =====
const params = new URLSearchParams(location.search);
const session = params.get("session");

if (!session) {
  statusEl.innerHTML = 
    '<span class="err">❌ Thiếu mã phiên (session).</span><br>Hãy quét lại QR từ máy tính.';
  startBtn.disabled = true;
} else {
  statusEl.innerHTML = 
    '<span class="ok">✅ Đã nhận phiên:</span><br>' + session;
}

let scanner = null;
let flashOn = false;

// ===== Gửi dữ liệu lên Firebase =====
async function sendData(text) {
  try {
    await db.ref('sessions/' + session + '/data').set({
      text: text,
      ts: Date.now()
    });

    statusEl.innerHTML = 
      '<span class="ok">✅ Đã gửi thành công</span><br><b>' + text + '</b>';

    // Dừng camera sau khi gửi
    if (scanner) {
      try { await scanner.stop(); } catch(e) {}
    }

    // Tự đóng tab sau 1.5 giây (nếu trình duyệt cho phép)
    setTimeout(() => {
      try { window.close(); } catch(e) {}
    }, 1500);

  } catch (err) {
    statusEl.innerHTML = '<span class="err">❌ Lỗi gửi dữ liệu</span>';
    console.error(err);
  }
}

// ===== Bắt đầu quét =====
startBtn.onclick = async () => {
  if (!session) return;

  startBtn.disabled = true;
  statusEl.innerHTML = '📷 Đang mở camera...';

  scanner = new Html5Qrcode("reader");

  try {
    await scanner.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 250, height: 250 },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.QR_CODE,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E
        ]
      },
      (decodedText) => {
        sendData(decodedText);
      },
      () => {}
    );

    statusEl.innerHTML = '🔍 Đưa camera vào mã QR hoặc mã vạch';

  } catch (err) {
    statusEl.innerHTML = '<span class="err">❌ Không mở được camera</span>';
    startBtn.disabled = false;
    console.error(err);
  }
};

// ===== Đèn flash =====
flashBtn.onclick = async () => {
  if (!scanner) return;

  try {
    const track = scanner.getRunningTrackSettings ? true : false;
    if (!track) return;

    flashOn = !flashOn;
    await scanner.applyVideoConstraints({
      advanced: [{ torch: flashOn }]
    });

    flashBtn.textContent = flashOn ? '💡 Tắt đèn' : '💡 Đèn flash';
  } catch (e) {
    alert('Thiết bị không hỗ trợ đèn flash');
  }
};
</script>

</body>
</html>
