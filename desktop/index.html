<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hậu GHN-Hiệp Hưng browser</title>
<style>
  :root {
    --bg-deep: #120a1f;
    --bg-panel: #1c1030;
    --neon-1: #c026ff;
    --neon-2: #8b2dff;
    --neon-3: #4d0bff;
    --neon-soft: #b57bff;
    --text: #ecdcff;
  }
  html, body {
    margin:0; padding:0; height:100%;
    font-family: -apple-system, Segoe UI, Arial, sans-serif;
    background: radial-gradient(circle at 20% 0%, #2a1240 0%, var(--bg-deep) 60%);
    color: var(--text);
  }
  #toolbar {
    display:flex; align-items:center; gap:8px; padding:10px;
    background: linear-gradient(180deg, #1c1030, #150b26);
    border-bottom: 1px solid rgba(192,38,255,0.35);
    box-shadow: 0 2px 16px rgba(139,45,255,0.25);
  }
  #toolbar button {
    background: linear-gradient(135deg, #2a1548, #1c0f36);
    color: var(--text); border: 1px solid rgba(192,38,255,0.4);
    padding:7px 12px; border-radius:8px; cursor:pointer;
    transition: all .15s ease;
  }
  #toolbar button:hover {
    border-color: var(--neon-1);
    box-shadow: 0 0 12px rgba(192,38,255,0.6);
    color: #fff;
  }
  #urlbar {
    flex:1; padding:8px 12px; border-radius:8px;
    border:1px solid rgba(139,45,255,0.4);
    background: #0f0819; color: var(--text);
    outline:none;
  }
  #urlbar:focus {
    border-color: var(--neon-1);
    box-shadow: 0 0 10px rgba(192,38,255,0.5);
  }
  #qrBtn {
    background: linear-gradient(135deg, var(--neon-1), var(--neon-3));
    border: none; font-weight:600;
    box-shadow: 0 0 14px rgba(192,38,255,0.55);
  }
  #qrBtn:hover {
    box-shadow: 0 0 22px rgba(192,38,255,0.9);
    filter: brightness(1.1);
  }
  #webviewWrap { position:relative; height: calc(100% - 56px); }
  webview { width:100%; height:100%; }
  #qrPanel {
    position:absolute; top:14px; right:14px; width:280px;
    background: linear-gradient(160deg, #1c1030, #120a1f);
    border:1px solid rgba(192,38,255,0.5);
    border-radius:14px; padding:16px; display:none; z-index:10;
    box-shadow: 0 0 30px rgba(139,45,255,0.45), 0 8px 24px rgba(0,0,0,.5);
  }
  #qrPanel.show { display:block; }
  #qrPanel canvas {
    width:100%; height:auto; background:#fff; border-radius:8px;
    box-shadow: 0 0 16px rgba(192,38,255,0.4);
  }
  #qrLink { font-size:11px; word-break:break-all; color: var(--neon-soft); margin-top:10px; display:block; }
  #qrStatus { font-size:12px; color:#7effc0; margin-top:8px; }
  #qrPanel h3 {
    margin:0 0 10px 0; font-size:14px; letter-spacing:.3px;
    background: linear-gradient(90deg, var(--neon-1), var(--neon-soft));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  #brand {
    font-weight:700; font-size:14px; white-space:nowrap; margin-right:6px;
    background: linear-gradient(90deg, var(--neon-1), var(--neon-soft));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:.2px;
  }
  #closeQr { position:absolute; top:10px; right:12px; cursor:pointer; color:#c7a8ff; }
  #closeQr:hover { color:#fff; }
</style>
</head>
<body>
  <div id="toolbar">
    <span id="brand">Hậu GHN-Hiệp Hưng browser</span>
    <button id="backBtn">◀</button>
    <button id="fwdBtn">▶</button>
    <button id="reloadBtn">⟳</button>
    <input id="urlbar" value="https://www.google.com" />
    <button id="goBtn">Đi</button>
    <button id="qrBtn">📱 Chia sẻ QR</button>
  </div>

  <div id="webviewWrap">
    <webview id="wv" src="https://www.google.com" partition="persist:browse"></webview>

    <div id="qrPanel">
      <span id="closeQr">✕</span>
      <h3>Quét bằng điện thoại</h3>
      <canvas id="qrCanvas"></canvas>
      <a id="qrLink" href="#" target="_blank"></a>
      <div id="qrStatus">Đang chờ dữ liệu quét...</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
  window.FIREBASE_CONFIG = {
    apiKey: "AIzaSyCPwMKElbsQLjOeSVddGAfjNiHnPHV9b1A",
    authDomain: "qrremod.firebaseapp.com",
    databaseURL: "https://qrremod-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "qrremod",
    storageBucket: "qrremod.firebasestorage.app",
    messagingSenderId: "949360436062",
    appId: "1:949360436062:web:c9b5b5d47ee4f76fdce5cf"
  };
  window.MOBILE_SCAN_URL = "https://trinhconghau22111999-arch.github.io/Qrtuxa/";

  const wv = document.getElementById('wv');
  const urlbar = document.getElementById('urlbar');

  function normalizeUrl(v) {
    v = v.trim();
    if (!v) return 'https://www.google.com';
    if (/^https?:\/\//i.test(v)) return v;
    if (v.includes('.') && !v.includes(' ')) return 'https://' + v;
    return 'https://www.google.com/search?q=' + encodeURIComponent(v);
  }

  document.getElementById('goBtn').onclick = () => wv.loadURL(normalizeUrl(urlbar.value));
  urlbar.addEventListener('keydown', e => { if (e.key === 'Enter') wv.loadURL(normalizeUrl(urlbar.value)); });
  document.getElementById('backBtn').onclick = () => wv.canGoBack() && wv.goBack();
  document.getElementById('fwdBtn').onclick = () => wv.canGoForward() && wv.goForward();
  document.getElementById('reloadBtn').onclick = () => wv.reload();
  wv.addEventListener('did-navigate', e => urlbar.value = e.url);
  wv.addEventListener('did-navigate-in-page', e => urlbar.value = e.url);

  function sanitizeText(text) {
    if (typeof text !== 'string') return '';
    return text.replace(/[^\p{L}\p{N}_\s]/gu, '');
  }

  function buildInjectionScript(text) {
    const fn = function (t) {
      const el = document.activeElement;
      if (!el) return false;
      try {
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
          const start = el.selectionStart ?? el.value.length;
          const end = el.selectionEnd ?? el.value.length;
          el.setRangeText(t, start, end, 'end');
          el.dispatchEvent(new Event('input', { bubbles: true }));
          el.dispatchEvent(new Event('change', { bubbles: true }));
          return true;
        }
        if (el.isContentEditable) {
          document.execCommand('insertText', false, t);
          return true;
        }
      } catch (e) {}
      return false;
    };
    return `(${fn.toString()})(${JSON.stringify(text)});`;
  }

  function injectIntoWebview(rawText) {
    const clean = sanitizeText(rawText);
    if (!clean) return;
    wv.executeJavaScript(buildInjectionScript(clean))
      .then(() => sendAutoConfirmKeys())
      .catch(() => {});
  }

  // ====== Tu dong bam Alt+Enter, neu khong duoc thi bam Enter ======
  function sendAutoConfirmKeys() {
    try {
      wv.sendInputEvent({ type: 'keyDown', keyCode: 'Enter', modifiers: ['alt'] });
      wv.sendInputEvent({ type: 'keyUp', keyCode: 'Enter', modifiers: ['alt'] });

      setTimeout(() => {
        wv.sendInputEvent({ type: 'keyDown', keyCode: 'Enter' });
        wv.sendInputEvent({ type: 'keyUp', keyCode: 'Enter' });
      }, 120);
    } catch (e) {}
  }

  let db = null;
  try {
    firebase.initializeApp(window.FIREBASE_CONFIG);
    db = firebase.database();
  } catch (e) {
    console.error('Firebase init error:', e);
  }

  let currentSession = null;
  let sessionRef = null;
  let lastTs = 0;

  function genSessionId() {
    return 'sess_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
  }

  const qrPanel = document.getElementById('qrPanel');
  const qrCanvas = document.getElementById('qrCanvas');
  const qrLink = document.getElementById('qrLink');
  const qrStatus = document.getElementById('qrStatus');

  document.getElementById('qrBtn').onclick = () => startSession();
  document.getElementById('closeQr').onclick = () => stopSession();

  function startSession() {
    try {
      if (typeof QRCode === 'undefined') {
        qrStatus.textContent = 'Lỗi: thư viện QRCode chưa tải được (kiểm tra mạng internet).';
        qrPanel.classList.add('show');
        return;
      }
      if (typeof firebase === 'undefined') {
        qrStatus.textContent = 'Lỗi: thư viện Firebase chưa tải được (kiểm tra mạng internet).';
        qrPanel.classList.add('show');
        return;
      }

      if (!db) {
        qrStatus.textContent = 'Lỗi: Firebase chưa khởi tạo được (kiểm tra firebaseConfig).';
        qrPanel.classList.add('show');
        return;
      }

      stopSession();
      currentSession = genSessionId();
      const link = `${window.MOBILE_SCAN_URL}?session=${currentSession}`;

      QRCode.toCanvas(qrCanvas, link, { width: 250, margin: 1 }, (err) => {
        if (err) qrStatus.textContent = 'Lỗi vẽ QR: ' + err.message;
      });
      qrLink.href = link;
      qrLink.textContent = link;
      qrStatus.textContent = 'Đang chờ dữ liệu quét...';
      qrPanel.classList.add('show');

      sessionRef = db.ref('sessions/' + currentSession);
      sessionRef.set({ createdAt: firebase.database.ServerValue.TIMESTAMP })
        .catch(e => { qrStatus.textContent = 'Lỗi ghi Firebase: ' + e.message; });

      sessionRef.child('data').on('value', snap => {
        const val = snap.val();
        if (!val || !val.text) return;
        if (val.ts && val.ts === lastTs) return;
        lastTs = val.ts || Date.now();
        qrStatus.textContent = 'Đã nhận: ' + sanitizeText(val.text).slice(0, 40);
        injectIntoWebview(val.text);
      }, (err) => {
        qrStatus.textContent = 'Lỗi lắng nghe Firebase: ' + err.message;
      });
    } catch (e) {
      qrStatus.textContent = 'Lỗi: ' + e.message;
      qrPanel.classList.add('show');
    }
  }

  function stopSession() {
    if (sessionRef) {
      sessionRef.child('data').off();
      sessionRef.remove().catch(() => {});
    }
    sessionRef = null;
    currentSession = null;
    lastTs = 0;
    qrPanel.classList.remove('show');
  }
  </script>
</body>
</html>
